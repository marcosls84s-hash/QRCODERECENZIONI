<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - RistoControl</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <!-- Font Awesome per le icone -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #FF9800; --bg: #F2F2F7; --red: #D32F2F; --success: #2E7D32; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; width: 100%; max-width: 400px; border-radius: 30px; padding: 40px 20px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.1); border-top: 6px solid var(--primary); }
        h1 { font-size: 20px; margin-bottom: 5px; color: #1a1a1a; }
        p { color: #666; margin-bottom: 25px; }
        .stars { display: flex; justify-content: center; gap: 12px; margin-bottom: 30px; direction: rtl; }
        .stars i { font-size: 38px; color: #ddd; cursor: pointer; transition: 0.2s; }
        .stars i:hover, .stars i:hover ~ i { color: var(--primary); }
        #privateForm { display: none; text-align: left; margin-top: 20px; }
        textarea, select { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 15px; font-size: 14px; box-sizing: border-box; outline: none; }
        textarea:focus { border-color: var(--primary); }
        .btn-send { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: 800; width: 100%; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn-send:disabled { background: #ccc; }
        #success { display:none; color: var(--success); font-weight:bold; margin-top:20px; font-size: 18px; }
    </style>
</head>
<body>
    <div class="card">
        <div id="step1">
            <i class="fas fa-utensils" style="font-size: 40px; color: var(--primary); margin-bottom: 15px;"></i>
            <h1 id="resName">RISTOCONTROL</h1>
            <p>Com'è andata la tua esperienza?</p>
            <div class="stars">
                <i class="fas fa-star" onclick="handleStar(5)"></i>
                <i class="fas fa-star" onclick="handleStar(4)"></i>
                <i class="fas fa-star" onclick="handleStar(3)"></i>
                <i class="fas fa-star" onclick="handleStar(2)"></i>
                <i class="fas fa-star" onclick="handleStar(1)"></i>
            </div>
        </div>

        <div id="privateForm">
            <h2 style="color: var(--red); font-size:18px; margin-bottom: 5px;">Cosa possiamo migliorare?</h2>
            <p style="font-size: 13px; margin-bottom: 15px;">La tua segnalazione arriverà in privato al titolare.</p>
            
            <label style="font-size:11px; font-weight:bold; color:#999; margin-left: 5px;">MOMENTO DEL PASTO</label>
            <select id="mealType"><option value="PRANZO">PRANZO</option><option value="CENA">CENA</option></select>
            
            <textarea id="comment" placeholder="Descrivi qui il problema riscontrato..."></textarea>
            
            <button id="btnSubmit" class="btn-send" onclick="sendToStaff()">INVIA SEGNALAZIONE</button>
        </div>

        <div id="success">
            <i class="fas fa-check-circle" style="font-size: 40px; display: block; margin-bottom: 10px;"></i>
            ✅ Grazie! Abbiamo ricevuto il tuo messaggio.
        </div>
    </div>

    <script>
        const config = { databaseURL: "https://comandaristorante-facile-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(config);
        const db = firebase.database();
        const params = new URLSearchParams(window.location.search);
        
        const resId = params.get('res');
        const tableNum = params.get('table') || "0"; 
        const waiterName = params.get('waiter') || "Staff";
        const googleUrl = params.get('google');
        let selectedRating = 0;

        // Carica nome ristorante
        if(resId) db.ref("restaurants/"+resId+"/info/name").once("value", s => { if(s.exists()) document.getElementById('resName').innerText = s.val().toUpperCase(); });

        function handleStar(rating) {
            selectedRating = rating;
            if (rating >= 4) {
                // REDIRECT GOOGLE PER 4-5 STELLE
                alert("Grazie mille! Ti stiamo portando sulla nostra pagina Google per condividere la tua recensione.");
                if (googleUrl) window.location.href = decodeURIComponent(googleUrl);
                else alert("Valutazione inviata!");
            } else {
                // MODULO PRIVATO PER 1-3 STELLE
                document.getElementById('step1').style.display = 'none';
                document.getElementById('privateForm').style.display = 'block';
            }
        }

        function sendToStaff() {
            const comment = document.getElementById('comment').value;
            const meal = document.getElementById('mealType').value;
            const btn = document.getElementById('btnSubmit');

            if (!comment.trim()) {
                alert("Per favore, scrivi un breve commento.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Invio in corso...";

            // Invio dati alla Bacheca Staff dell'App Android
            const boardRef = db.ref("restaurants/" + resId + "/staff_board").push();
            boardRef.set({
                id: boardRef.key,
                senderName: "FEEDBACK CLIENTE",
                text: comment,
                timestamp: Date.now(),
                isFeedback: true,
                tableNumber: parseInt(tableNum),
                mealType: meal,
                rating: selectedRating,
                servedBy: waiterName
            }).then(() => {
                document.getElementById('privateForm').style.display = 'none';
                document.getElementById('success').style.display = 'block';
            }).catch(() => {
                alert("Errore. Riprova.");
                btn.disabled = false;
                btn.innerText = "INVIA SEGNALAZIONE";
            });
        }
    </script>
</body>
</html>
