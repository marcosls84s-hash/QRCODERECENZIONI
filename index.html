<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Ristorante - RistoControl</title>
    <!-- Firebase SDK v8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #FF9800; --dark: #1a1a1a; --bg: #F2F2F7; --success: #2E7D32; --red: #D32F2F; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: var(--dark); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        
        .card { background: white; width: 90%; max-width: 400px; border-radius: 30px; padding: 40px 20px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.1); border-top: 5px solid var(--primary); }
        h1 { font-size: 22px; margin-bottom: 10px; }
        p { color: #666; font-size: 15px; margin-bottom: 30px; }

        /* Stelle */
        .stars { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; direction: rtl; }
        .stars i { font-size: 40px; color: #ddd; cursor: pointer; transition: 0.2s; }
        .stars i:hover, .stars i:hover ~ i, .stars i.active, .stars i.active ~ i { color: var(--primary); }

        /* Modulo Privato */
        #privateForm { display: none; margin-top: 20px; text-align: left; }
        select, textarea { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid #ddd; margin-bottom: 15px; font-family: inherit; font-size: 14px; box-sizing: border-box; }
        textarea { height: 100px; resize: none; }
        .btn-send { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: 800; width: 100%; font-size: 16px; cursor: pointer; }
        
        .success-msg { display: none; color: var(--success); font-weight: bold; }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <div id="step1">
            <i class="fas fa-utensils" style="font-size: 40px; color: var(--primary); margin-bottom: 20px;"></i>
            <h1 id="resName">RISTOCONTROL</h1>
            <p>Com'è andata la tua esperienza?<br>Lasciaci una valutazione veloce!</p>

            <div class="stars">
                <i class="fas fa-star" onclick="handleStar(5)"></i>
                <i class="fas fa-star" onclick="handleStar(4)"></i>
                <i class="fas fa-star" onclick="handleStar(3)"></i>
                <i class="fas fa-star" onclick="handleStar(2)"></i>
                <i class="fas fa-star" onclick="handleStar(1)"></i>
            </div>
        </div>

        <div id="privateForm">
            <h2 style="font-size: 18px; color: var(--red);">Cosa non ti è piaciuto?</h2>
            <p style="margin-bottom: 15px;">Il tuo messaggio arriverà in privato al titolare per permetterci di migliorare.</p>
            
            <label style="font-size: 12px; font-weight: bold; color: #999;">TIPO DI SERVIZIO</label>
            <select id="mealType">
                <option value="PRANZO">PRANZO</option>
                <option value="CENA">CENA</option>
            </select>

            <textarea id="comment" placeholder="Scrivi qui la tua segnalazione..."></textarea>
            
            <button id="btnSubmit" class="btn-send" onclick="sendToStaff()">INVIA SEGNALAZIONE</button>
        </div>

        <div id="success" class="success-msg">
            <i class="fas fa-check-circle" style="font-size: 50px; display: block; margin-bottom: 15px;"></i>
            Grazie! Abbiamo ricevuto il tuo messaggio e faremo tesoro dei tuoi consigli.
        </div>
    </div>

    <script>
        const config = { databaseURL: "https://comandaristorante-facile-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(config);
        const db = firebase.database();

        // LEGGE TUTTI I PARAMETRI DALL'APP ANDROID
        const params = new URLSearchParams(window.location.search);
        const resId = params.get('res');
        const tableNum = params.get('table') || "0";
        const waiterName = params.get('waiter') || "Staff"; // RECUPERA IL CAMERIERE
        const googleUrl = params.get('google');
        let selectedRating = 0;

        if (resId) {
            db.ref("restaurants/" + resId + "/info/name").once("value", s => {
                if (s.exists()) document.getElementById('resName').innerText = s.val().toUpperCase();
            });
        }

        function handleStar(rating) {
            selectedRating = rating;
            if (rating >= 4) {
                alert("Grazie mille! Ti stiamo portando sulla nostra pagina Google per condividere il tuo entusiasmo.");
                if (googleUrl) window.location.href = decodeURIComponent(googleUrl);
                else alert("Recensione inviata!");
            } else {
                document.getElementById('step1').style.display = 'none';
                document.getElementById('privateForm').style.display = 'block';
            }
        }

        function sendToStaff() {
            const comment = document.getElementById('comment').value;
            const meal = document.getElementById('mealType').value;
            const btn = document.getElementById('btnSubmit');

            if (!comment.trim()) {
                alert("Per favore, scrivi un breve commento.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Invio in corso...";

            // INVIA TUTTI I DATI ALLA BACHECA (Data, Tavolo, Cameriere, Stelle, Messaggio)
            const boardRef = db.ref("restaurants/" + resId + "/staff_board").push();
            boardRef.set({
                id: boardRef.key,
                senderName: "FEEDBACK CLIENTE",
                text: comment,
                timestamp: Date.now(),
                isFeedback: true,
                tableNumber: parseInt(tableNum),
                mealType: meal,
                rating: selectedRating,
                servedBy: waiterName // SALVA IL CAMERIERE CHE HA SEGUITO IL TAVOLO
            }).then(() => {
                document.getElementById('privateForm').style.display = 'none';
                document.getElementById('success').style.display = 'block';
            }).catch(() => {
                alert("Errore di invio. Riprova.");
                btn.disabled = false;
                btn.innerText = "INVIA SEGNALAZIONE";
            });
        }
    </script>
</body>
</html>
